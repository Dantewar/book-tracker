<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Tracker</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

  <div class="container">
    <h1>📚 Book Tracker</h1>

    <div class="form">
      <input id="title" placeholder="Book title">
      <input id="author" placeholder="Author">
      <button onclick="addBookUI()">Add Book</button>
    </div>

    <div class="actions">
      <button onclick="showAll()">All Books</button>
      <button onclick="listUnreadUI()">Unread</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script src="script/main.js"></script>
</body>
</html>
